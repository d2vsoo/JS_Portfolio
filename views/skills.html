<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 지수의 포트폴리오 </title>
    <style>
        /* 1920*1080 크기로 만들기 */
        
        /* 폰트 */
        @font-face {
            font-family: 'Pretendard-Regular';
            src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'Giants-Inline';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-1@1.1/Giants-Inline.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        /* 기본 설정 */
        * {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard-Regular';
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        li {
            list-style: none;
        }

        body {
            max-width: 1920px;
            height: 900px;
            background-color: rgb(84, 92, 136);
            color: white;
        }

        /* header */
        header {
            width: 100%;
            height: 100px;
            position: relative;
        }

        header>h2 {
            width: 440px;
            left: 30px;
            top: 30px;
            padding-bottom: 12px;
            box-sizing: border-box;
            border-bottom: 0.5px solid white;
            position: absolute;
            font-style: italic;
        }

        nav {
            width: 330px;
            height: 30px;
            position: absolute;
            right: 30px;
            top: 45px;
        }

        menu li{
            float: left;
            margin-right: 20px;
        }

        menu li:hover {
            opacity: 0.3;;
        }

        /* main */
        main {
            height: 780px;
            position: relative;
        }

        #content {
            text-align: center;
            font-size: 20px;
            padding-top: 180px;
            box-sizing: border-box;
        }

        #content p:nth-of-type(3) {
            font-size: 140px;
            margin-top: 50px;
            font-family: 'Giants-Inline';
        }

        #info {
            width: 180px;
            height: 45px;
            border-radius: 30px;
            text-align: center;
            padding-top: 13px;
            box-sizing: border-box;
            position: absolute;
            left: 900px;
            bottom: 180px;
            border: 1px solid white;
        }

        /* footer */
        footer {
            text-align: center;
            font-size: 10px;
        }

    </style>
</head>

<body>
    <!-- header -->
    <header>
        <h2> JISOO's PORTFOLIO </h2>
        <nav>
            <menu>
                <li><a href="#"> HOME </a></li>
                <li><a href="#"> ABOUT ME </a></li>
                <li><a href="#"> SKILLS </a></li>
                <li><a href="#"> MY WORK </a></li>
            </menu>
        </nav>
    </header>

    <!-- main -->
    <main>
        <div id="content">
            <p> 안녕하세요. </p>
            <p> 끊임없이 성장하는 풀스택 개발자 신지수입니다. </p>
            <p> Full-Stack Developer </p>
        </div>
        <div id="info">
            <p> 자세히 알아보기 </p>
        </div>
    </main>

    <!-- footer -->
    <footer>
        © 2024. 신지수 Co. all rights reserved.
    </footer>

</body>

</html>
