    <title> 지수의 포트폴리오 </title>
    <link rel="stylesheet" href="/public/main.css">
    <style>
        
        /* 첫 번째 페이지 */
        #work01 {
            width: 100%;
            height: 100%;
            background-color: aqua;
            padding: 30px;
            box-sizing: border-box;
        }

        .design_button {
            width: 560px;
            height: 230px;
            background-color: white;
            border: none;
            margin-top: 10px;
            margin-left: 30px;
        }

        .design_button p:nth-of-type(1) {
            text-align: left;
            padding: 15px;
            box-sizing: border-box;
            margin-top: -120px;
            font-size: 24px;
        }

        .design_button p:nth-of-type(2) {
            margin-left: 15px;
            text-align: left;
            font-size: 16px;
        }

        #background {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: rgb(0,0,0,0.5);
            display: none;
        }

        #work {
            width: 80%;
            height: 800px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);            background-color: white;
            overflow: scroll;
            display: none;
        }

        #work img {
            margin-left: 10%;
        }

        #work h3 {
            font-size: 24px;
            margin: 30px;
            text-align: left;
            font-style: italic;
            color: rgb(84, 92, 136);
        }

        #exit {
            width: 150px;
            height: 30px;
            background-color:  rgb(84, 92, 136);
            color: white;
            border: none;
            margin: 15px 150px 0 0 ;
            float: right;
        }

        #work02 {
            width: 100%;
            height: 100%;
            background-color: white;
        }

        #work03 {
            width: 100%;
            height: 100%;
            background-color: antiquewhite;
        }
    </style>
</head>
